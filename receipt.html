<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BoostPanel Receipt</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background: radial-gradient(circle at top, #0f172a, #020617);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
}

/* CARD */
.receipt{
  width:100%;
  max-width:460px;
  background:rgba(15,23,42,0.95);
  border:1px solid #1e293b;
  border-radius:26px;
  padding:26px;
  box-shadow:0 20px 60px rgba(124,58,237,0.15);
  backdrop-filter: blur(10px);
}

/* HEADER */
.logo{
  font-size:46px;
  text-align:center;
}

.title{
  text-align:center;
  font-size:26px;
  font-weight:800;
  margin-top:6px;
}

.subtitle{
  text-align:center;
  font-size:13px;
  opacity:0.7;
  margin-bottom:18px;
}

.line{
  height:1px;
  background:#1e293b;
  margin:18px 0;
}

/* LOADING */
.loading{
  text-align:center;
  opacity:0.7;
  padding:20px;
}

/* ITEM */
.item{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:10px 0;
  border-bottom:1px solid rgba(30,41,59,0.6);
}

.label{
  font-size:13px;
  opacity:0.6;
  min-width:110px;
}

.value{
  text-align:right;
  font-size:14px;
  font-weight:600;
  max-width:250px;
  word-break:break-word;
}

/* STATUS */
.status{ color:#22c55e; font-weight:bold; }
.total{ color:#a855f7; font-size:18px; font-weight:800; }

/* FOOTER */
.footer-card{
  margin-top:18px;
  padding:14px;
  border-radius:16px;
  background:linear-gradient(135deg, #1e1b4b, #0f172a);
  border:1px solid #312e81;
  text-align:center;
  font-size:13px;
  line-height:1.6;
  color:#cbd5e1;
}

/* BUTTON STYLE GLOBAL (IMPORTANT FIX) */
.btn{
  width:100%;
  margin-top:12px;
  padding:15px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

/* PRINT BUTTON */
.btn-print{
  background:linear-gradient(135deg, #7c3aed, #9333ea);
  color:white;
}

.btn-print:hover{
  transform:translateY(-2px);
}

/* PDF BUTTON */
.btn-pdf{
  background:linear-gradient(135deg, #0ea5e9, #2563eb);
  color:white;
}

.btn-pdf:hover{
  transform:translateY(-2px);
}

/* PRINT MODE */
@media print{
  body{ background:white; }
  .receipt{ box-shadow:none; border:none; }
  .btn{ display:none; }
}

/* TOAST */
#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#0f172a;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  border:1px solid #334155;
  display:none;
}

</style>

</head>

<body>

<div class="receipt" id="receiptBox">

  <div class="logo">🚀</div>

  <div class="title">BoostPanel Receipt</div>

  <div class="subtitle">Bukti transaksi pemesanan layanan</div>

  <div class="line"></div>

  <div id="receiptContent">
    <div class="loading">Memuat data struk...</div>
  </div>

  <div class="footer-card">
    🙏 Terima kasih telah menggunakan <b>BoostPanel</b> 🚀<br>
    Kami menghargai kepercayaan Anda.
  </div>

  <!-- BUTTONS (FIXED CONSISTENT UI) -->
<button onclick="printReceipt()" class="btn btn-print">
  🖨️ Cetak Struk
</button>

  <button class="btn btn-pdf" onclick="downloadPDF()">
    ⬇️ Download PDF
  </button>

</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- LIB -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- INI WAJIB -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script src="receipt.js"></script>

</body>
</html>
