<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BoostPanel Receipt</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020617;
  font-family:Arial,sans-serif;
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.receipt{
  width:100%;
  max-width:430px;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:24px;
  padding:24px;
  box-shadow:
    0 0 40px rgba(124,58,237,.15),
    0 10px 30px rgba(0,0,0,.45);
}

.logo{
  font-size:48px;
  text-align:center;
  margin-bottom:10px;
}

.title{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:6px;
}

.subtitle{
  text-align:center;
  font-size:13px;
  opacity:.7;
  margin-bottom:24px;
}

.line{
  width:100%;
  height:1px;
  background:#1e293b;
  margin:18px 0;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
  margin-bottom:16px;
}

.label{
  font-size:14px;
  opacity:.7;
}

.value{
  text-align:right;
  font-size:14px;
  font-weight:bold;
  max-width:210px;
  word-break:break-word;
}

.total{
  color:#a855f7;
  font-size:18px;
}

.status{
  color:#22c55e;
}

.footer{
  margin-top:24px;
  padding:14px;
  border-radius:14px;
  background:#020617;
  border:1px solid #1e293b;
  text-align:center;
  font-size:12px;
  line-height:1.7;
  opacity:.8;
}

.print-btn{
  width:100%;
  margin-top:20px;
  padding:15px;
  border:none;
  border-radius:14px;
  background:linear-gradient(
    135deg,
    #7c3aed,
    #9333ea
  );
  color:white;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:.25s;
}

.print-btn:hover{
  transform:translateY(-2px);
  opacity:.95;
}

.loading{
  text-align:center;
  opacity:.7;
  padding:20px 0;
}

@media print{

  body{
    background:white;
    padding:0;
  }

  .receipt{
    box-shadow:none;
    border:none;
    max-width:100%;
  }

  .print-btn{
    display:none;
  }

}

</style>

</head>
<body>

<div class="receipt">

  <div class="logo">🚀</div>

  <div class="title">
    BoostPanel Receipt
  </div>

  <div class="subtitle">
    Bukti transaksi pemesanan layanan
  </div>

  <div class="line"></div>

  <div id="receiptContent">

    <div class="loading">
      Memuat data struk...
    </div>

  </div>

  <button
    class="print-btn"
    onclick="window.print()"
  >
    Cetak Struk
  </button>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyD0ADo1TMD5ASjJ_l4062EEJtqZ2irmuIw",
  authDomain: "boostpanel-myown.firebaseapp.com",
  projectId: "boostpanel-myown",
  storageBucket: "boostpanel-myown.firebasestorage.app",
  messagingSenderId: "1003583759714",
  appId: "1:1003583759714:web:1b9b88c96825ec5d56783b"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const params =
  new URLSearchParams(window.location.search);

const orderId = params.get("id");

async function loadReceipt() {

  const container =
    document.getElementById("receiptContent");

  if (!orderId) {

    container.innerHTML = `
      <div class="loading">
        ID pesanan tidak ditemukan
      </div>
    `;

    return;
  }

  try {

    const snapshot = await db
      .collection("orders")
      .where("id", "==", orderId)
      .get();

    if (snapshot.empty) {

      container.innerHTML = `
        <div class="loading">
          Order tidak ditemukan
        </div>
      `;

      return;
    }

    const data = snapshot.docs[0].data();

    let tanggal = "-";

    if (data.createdAt?.toDate) {

      tanggal = data.createdAt
        .toDate()
        .toLocaleString("id-ID");
    }

    container.innerHTML = `

      <div class="item">
        <div class="label">ID</div>
        <div class="value">
          ${data.id || "-"}
        </div>
      </div>

      <div class="item">
        <div class="label">Layanan</div>
        <div class="value">
          ${data.layanan || "-"}
        </div>
      </div>

      <div class="item">
        <div class="label">Tipe</div>
        <div class="value">
          ${data.tipe || "-"}
        </div>
      </div>

      <div class="item">
        <div class="label">Jumlah</div>
        <div class="value">
          ${data.jumlah || "-"}
        </div>
      </div>

      <div class="item">
        <div class="label">Total</div>
        <div class="value total">
          Rp ${data.total || "0"}
        </div>
      </div>

      <div class="item">
        <div class="label">Status</div>
        <div class="value status">
          ${data.status || "-"}
        </div>
      </div>

      <div class="item">
        <div class="label">Tanggal</div>
        <div class="value">
          ${tanggal}
        </div>
      </div>

      <div class="item">
        <div class="label">Link</div>
        <div class="value">
          ${data.link || "-"}
        </div>
      </div>

      <div class="line"></div>

      <div class="footer">
        Terima kasih telah menggunakan
        layanan BoostPanel 🚀
      </div>

    `;

  } catch (err) {

    console.error(err);

    container.innerHTML = `
      <div class="loading">
        Gagal mengambil data struk
      </div>
    `;
  }
}

loadReceipt();

</script>

</body>
</html>
