<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Receipt BoostPanel</title>

<style>

body{
  background:#0f172a;
  font-family:Arial;
  color:white;
  display:flex;
  justify-content:center;
  padding:20px;
}

.receipt{
  background:#1e293b;
  width:100%;
  max-width:420px;
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.logo{
  text-align:center;
  font-size:28px;
  margin-bottom:10px;
}

.title{
  text-align:center;
  font-size:22px;
  margin-bottom:20px;
}

.line{
  height:1px;
  background:#334155;
  margin:15px 0;
}

.item{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
  gap:10px;
}

.label{
  opacity:.7;
}

.value{
  text-align:right;
  word-break:break-word;
}

.status{
  color:#22c55e;
  font-weight:bold;
}

.print-btn{
  width:100%;
  margin-top:20px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#7c3aed;
  color:white;
  font-size:16px;
  cursor:pointer;
}

@media print{
  .print-btn{
    display:none;
  }

  body{
    background:white;
  }

  .receipt{
    box-shadow:none;
  }
}

</style>
</head>
<body>

<div class="receipt">

<div class="logo">🚀</div>

<div class="title">
  BoostPanel Receipt
</div>

<div class="line"></div>

<div class="item">
  <div class="label">ID</div>
  <div class="value" id="id"></div>
</div>

<div class="item">
  <div class="label">Layanan</div>
  <div class="value" id="layanan"></div>
</div>

<div class="item">
  <div class="label">Jumlah</div>
  <div class="value" id="jumlah"></div>
</div>

<div class="item">
  <div class="label">Total</div>
  <div class="value" id="total"></div>
</div>

<div class="item">
  <div class="label">Status</div>
  <div class="value status" id="status"></div>
</div>

<div class="item">
  <div class="label">Tanggal</div>
  <div class="value" id="tanggal"></div>
</div>

<div class="item">
  <div class="label">Link</div>
  <div class="value" id="link"></div>
</div>

<div class="line"></div>

<button class="print-btn" onclick="window.print()">
Cetak Struk
</button>

</div>

<script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0ADo1TMD5ASjJ_l4062EEJtqZ2irmuIw",
  authDomain: "boostpanel-myown.firebaseapp.com",
  projectId: "boostpanel-myown",
  storageBucket: "boostpanel-myown.firebasestorage.app",
  messagingSenderId: "1003583759714",
  appId: "1:1003583759714:web:1b9b88c96825ec5d56783b"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

const params = new URLSearchParams(window.location.search);

const orderId = params.get("id");

async function loadReceipt() {

  if (!orderId) return;

  try {

    const snapshot = await db
      .collection("orders")
      .where("id", "==", orderId)
      .get();

    if (snapshot.empty) {
      alert("Order tidak ditemukan");
      return;
    }

    const data = snapshot.docs[0].data();

    document.getElementById("r-id").innerText =
      data.id || "-";

    document.getElementById("r-layanan").innerText =
      data.layanan || "-";

    document.getElementById("r-jumlah").innerText =
      data.jumlah || "-";

    document.getElementById("r-total").innerText =
      "Rp " + (data.total || "0");

    document.getElementById("r-status").innerText =
      data.status || "-";

    document.getElementById("r-link").innerText =
      data.link || "-";

    let tanggal = "-";

    if (data.createdAt?.toDate) {
      tanggal = data.createdAt
        .toDate()
        .toLocaleString("id-ID");
    }

    document.getElementById("r-tanggal").innerText =
      tanggal;

  } catch (err) {

    console.error(err);

    alert("Gagal mengambil data struk");
  }
}

loadReceipt();

</script>

</body>
</html>
